version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: drilling-insight-db
    environment:
      POSTGRES_DB: drilling_insight
      POSTGRES_USER: drilling_user
      POSTGRES_PASSWORD: drilling_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drilling_user -d drilling_insight"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: drilling-insight-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@drilling.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: